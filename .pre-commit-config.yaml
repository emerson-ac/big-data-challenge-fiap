repos:
  # 1. Ensure uv.lock is up-to-date with pyproject.toml
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.19
    hooks:
      - id: uv-lock

  # 2. Run Ruff for linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      # Linter runs first to fix auto-fixable rules and imports
      - id: ruff-check
        args: [--fix]
      # Formatter runs second to clean up the code layout
      - id: ruff-format

  # 3. Standard text sanitation checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
